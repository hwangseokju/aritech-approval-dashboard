<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아리텍바이오 결재 현황</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1C3557" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="결재대시보드" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1a1a2e; }

    /* ── 로그인 화면 ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #1C3557;
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 40px 48px;
      text-align: center; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .login-box h1 { font-size: 20px; font-weight: 700; color: #1C3557; margin-bottom: 4px; }
    .login-box p  { font-size: 13px; color: #666; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #2C5282; }
    .login-box button {
      width: 100%; padding: 11px; background: #1C3557; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .login-box button:hover { background: #2C5282; }
    .login-error { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; }

    /* ── 메인 대시보드 ── */
    #dashboard { display: none; }

    header {
      background: #1C3557; color: #fff;
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 13px; opacity: .7; }
    .refresh-btn {
      background: rgba(255,255,255,.15); border: none; color: #fff;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .refresh-btn:hover { background: rgba(255,255,255,.25); }

    main { padding: 28px 32px; max-width: 1280px; margin: 0 auto; }

    /* ── 상태 카드 ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card.total   .value { color: #1C3557; }
    .stat-card.prog    .value { color: #d69e2e; }
    .stat-card.done    .value { color: #2f855a; }
    .stat-card.reject  .value { color: #c53030; }
    .stat-card.return_ .value { color: #6b46c1; }
    .stat-card.cancel  .value { color: #718096; }

    /* ── 차트 영역 ── */
    .chart-grid {
      display: grid; grid-template-columns: 1fr 2fr 1fr;
      gap: 18px; margin-bottom: 28px;
    }
    @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
    .chart-card {
      background: #fff; border-radius: 12px; padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .chart-card h3 { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 220px; }

    /* ── 결재 목록 ── */
    .list-card {
      background: #fff; border-radius: 12px; padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .list-card h3 { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 16px; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-row select, .filter-row input {
      padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; outline: none;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: #f7f8fa; padding: 10px 12px; text-align: left;
      font-weight: 600; color: #555; border-bottom: 1px solid #eee;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-prog    { background: #fefcbf; color: #92400e; }
    .badge-done    { background: #c6f6d5; color: #276749; }
    .badge-reject  { background: #fed7d7; color: #9b2c2c; }
    .badge-return_ { background: #e9d8fd; color: #553c9a; }
    .badge-halt    { background: #fed7d7; color: #9b2c2c; }
    .badge-cancel  { background: #e2e8f0; color: #4a5568; }
    .no-data { text-align: center; color: #aaa; padding: 32px; font-size: 14px; }

    .loading { text-align: center; padding: 60px; color: #aaa; }

    .btn-pdf {
      padding: 4px 10px; background: #1C3557; color: #fff;
      border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
      white-space: nowrap; transition: background .15s;
    }
    .btn-pdf:hover { background: #2C5282; }
    .btn-pdf:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen">
  <div class="login-box">
    <h1>㈜아리텍바이오</h1>
    <p>결재 현황 대시보드</p>
    <input type="password" id="api-key-input" placeholder="비밀번호 입력" />
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard">
  <header>
    <h1>㈜아리텍바이오 결재 현황</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="last-updated">—</span>
      <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
      <button class="refresh-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main>
    <!-- 통계 카드 -->
    <div class="stat-grid">
      <div class="stat-card total">  <div class="label">전체</div>      <div class="value" id="s-total">—</div></div>
      <div class="stat-card prog">   <div class="label">⏳ 진행중</div>  <div class="value" id="s-prog">—</div></div>
      <div class="stat-card done">   <div class="label">✅ 완료</div>    <div class="value" id="s-done">—</div></div>
      <div class="stat-card reject"> <div class="label">❌ 반려</div>    <div class="value" id="s-reject">—</div></div>
      <div class="stat-card return_"><div class="label">↩️ 보완요청</div><div class="value" id="s-return">—</div></div>
      <div class="stat-card cancel"> <div class="label">🚫 취소/정지</div><div class="value" id="s-cancel">—</div></div>
    </div>

    <!-- 차트 -->
    <div class="chart-grid">
      <div class="chart-card">
        <h3>상태별 비율</h3>
        <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>월별 결재 건수</h3>
        <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>신청자별</h3>
        <div class="chart-wrap"><canvas id="chart-applicant"></canvas></div>
      </div>
    </div>

    <!-- 결재 목록 -->
    <div class="list-card">
      <h3>결재 목록</h3>
      <div class="filter-row">
        <select id="filter-status" onchange="renderTable()">
          <option value="">전체 상태</option>
          <option value="PROGRESS">⏳ 진행중</option>
          <option value="IN_PROGRESS">✅ 완료</option>
          <option value="REJECTED">❌ 반려</option>
          <option value="RETURNED">↩️ 보완요청</option>
          <option value="CANCELLED">🚫 취소</option>
          <option value="HALTED">⛔ 정지</option>
        </select>
        <select id="filter-doctype" onchange="renderTable()">
          <option value="">전체 문서종류</option>
        </select>
        <input type="text" id="filter-search" placeholder="이름 / 제목 검색"
               oninput="renderTable()" style="min-width:160px;" />
      </div>
      <div id="table-wrap"><div class="no-data">불러오는 중...</div></div>
    </div>
  </main>
</div>

<script>
const API_BASE = 'https://arium-approval-bot-production.up.railway.app';
let allApprovals = [];
let charts = {};

const STATUS_LABEL = {
  PROGRESS:    '⏳ 진행중',
  IN_PROGRESS: '✅ 완료',
  REJECTED:    '❌ 반려',
  RETURNED:    '↩️ 보완요청',
  HALTED:      '⛔ 정지',
  CANCELLED:   '🚫 취소',
};
const STATUS_BADGE = {
  PROGRESS:    'badge-prog',
  IN_PROGRESS: 'badge-done',
  REJECTED:    'badge-reject',
  RETURNED:    'badge-return_',
  HALTED:      'badge-halt',
  CANCELLED:   'badge-cancel',
};

// ── 인증 ──────────────────────────────────────────────────
function getKey() { return localStorage.getItem('dash_api_key') || ''; }

async function doLogin() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  // 실제 API 호출로 검증
  try {
    const res = await fetch(`${API_BASE}/api/dashboard/stats`, {
      headers: { 'X-API-Key': key }
    });
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    localStorage.setItem('dash_api_key', key);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } catch (e) {
    document.getElementById('login-error').textContent = '서버에 연결할 수 없습니다.';
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('dash_api_key');
  location.reload();
}

document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── 데이터 로드 ────────────────────────────────────────────
async function loadAll() {
  const key = getKey();
  try {
    const [statsRes, listRes] = await Promise.all([
      fetch(`${API_BASE}/api/dashboard/stats`,     { headers: { 'X-API-Key': key } }),
      fetch(`${API_BASE}/api/dashboard/approvals`, { headers: { 'X-API-Key': key } }),
    ]);
    if (statsRes.status === 401 || listRes.status === 401) { doLogout(); return; }
    const stats = await statsRes.json();
    const list  = await listRes.json();
    allApprovals = list.approvals || [];
    renderStats(stats);
    renderCharts(stats);
    renderDocTypeFilter();
    renderTable();
    document.getElementById('last-updated').textContent =
      '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  } catch (e) {
    console.error(e);
  }
}

// ── 통계 카드 ──────────────────────────────────────────────
function renderStats(s) {
  document.getElementById('s-total').textContent  = s.total ?? 0;
  document.getElementById('s-prog').textContent   = s.by_status?.PROGRESS    ?? 0;
  document.getElementById('s-done').textContent   = s.by_status?.IN_PROGRESS ?? 0;
  document.getElementById('s-reject').textContent = s.by_status?.REJECTED    ?? 0;
  document.getElementById('s-return').textContent = s.by_status?.RETURNED    ?? 0;
  const cancel = (s.by_status?.CANCELLED ?? 0) + (s.by_status?.HALTED ?? 0);
  document.getElementById('s-cancel').textContent = cancel;
}

// ── 차트 ───────────────────────────────────────────────────
function renderCharts(s) {
  // 상태별 도넛
  const statusData = {
    labels: Object.keys(s.by_status || {}).map(k => STATUS_LABEL[k] || k),
    datasets: [{
      data: Object.values(s.by_status || {}),
      backgroundColor: ['#ECC94B','#48BB78','#FC8181','#B794F4','#FC8181','#A0AEC0'],
      borderWidth: 2, borderColor: '#fff',
    }]
  };
  if (charts.status) charts.status.destroy();
  charts.status = new Chart(document.getElementById('chart-status'), {
    type: 'doughnut', data: statusData,
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
               maintainAspectRatio: false }
  });

  // 월별 바
  const months  = Object.keys(s.monthly || {});
  const mcounts = Object.values(s.monthly || {});
  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(document.getElementById('chart-monthly'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{ label: '건수', data: mcounts,
        backgroundColor: '#2C5282', borderRadius: 6 }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
      maintainAspectRatio: false,
    }
  });

  // 신청자별 가로 바
  const names  = Object.keys(s.by_applicant || {});
  const acnts  = Object.values(s.by_applicant || {});
  if (charts.applicant) charts.applicant.destroy();
  charts.applicant = new Chart(document.getElementById('chart-applicant'), {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{ label: '건수', data: acnts,
        backgroundColor: '#2f855a', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
      maintainAspectRatio: false,
    }
  });
}

// ── 필터 ───────────────────────────────────────────────────
function renderDocTypeFilter() {
  const sel = document.getElementById('filter-doctype');
  const types = [...new Set(allApprovals.map(a => a.doc_type).filter(Boolean))];
  sel.innerHTML = '<option value="">전체 문서종류</option>';
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = t;
    sel.appendChild(opt);
  });
}

// ── 결재 목록 테이블 ────────────────────────────────────────
function renderTable() {
  const statusF  = document.getElementById('filter-status').value;
  const doctypeF = document.getElementById('filter-doctype').value;
  const searchF  = document.getElementById('filter-search').value.toLowerCase();

  const rows = allApprovals.filter(a => {
    if (statusF  && a.status   !== statusF)  return false;
    if (doctypeF && a.doc_type !== doctypeF) return false;
    if (searchF && !`${a.title}${a.applicant_name}`.toLowerCase().includes(searchF)) return false;
    return true;
  });

  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="no-data">해당하는 결재가 없습니다.</div>';
    return;
  }

  const amtFmt = v => v ? `${Number(v).toLocaleString()}원` : '—';
  const dateFmt = v => v ? v.slice(0,10) : '—';

  const html = `
    <table>
      <thead>
        <tr>
          <th>번호</th><th>문서종류</th><th>제목</th>
          <th>신청자</th><th>금액</th><th>상태</th>
          <th>기안일</th><th>처리일</th><th>PDF</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(a => `
          <tr>
            <td>A-${String(a.id).padStart(5,'0')}</td>
            <td>${a.doc_type || '—'}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                title="${a.title}">${a.title || '—'}</td>
            <td>${a.applicant_name || '—'}</td>
            <td>${amtFmt(a.amount)}</td>
            <td><span class="badge ${STATUS_BADGE[a.status] || ''}">${STATUS_LABEL[a.status] || a.status}</span></td>
            <td>${dateFmt(a.created_at)}</td>
            <td>${dateFmt(a.decided_at)}</td>
            <td>${(a.status === 'IN_PROGRESS' || a.pdf_filename)
              ? `<button class="btn-pdf" onclick="downloadPdf(${a.id}, this)">⬇ 다운로드</button>`
              : '<span style="color:#ccc;font-size:12px;">—</span>'
            }</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  document.getElementById('table-wrap').innerHTML = html;
}

// ── PDF 다운로드 ────────────────────────────────────────────
async function downloadPdf(id, btn) {
  btn.disabled = true;
  btn.textContent = '로딩중...';
  try {
    const res = await fetch(`${API_BASE}/api/dashboard/pdf/${id}`, {
      headers: { 'X-API-Key': getKey() }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert(err.detail || 'PDF 다운로드 실패');
      return;
    }
    const disposition = res.headers.get('content-disposition') || '';
    const match = disposition.match(/filename[^;=\n]*=([^;\n]*)/);
    const filename = match ? match[1].replace(/['"]/g, '').trim()
                           : `A-${String(id).padStart(5,'0')}.pdf`;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('서버에 연결할 수 없습니다.');
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ 다운로드';
  }
}

// ── 초기화 ──────────────────────────────────────────────────
window.onload = () => {
  const key = getKey();
  if (key) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
};
</script>
</body>
</html>
